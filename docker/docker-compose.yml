version: "3.9"

# ══════════════════════════════════════════════════════════════════
#  BTC Liquidation Predictor — Docker Compose
#  Usage:
#    docker compose -f docker/docker-compose.yml up -d          # start all
#    docker compose -f docker/docker-compose.yml up dashboard   # chỉ dashboard
#    docker compose -f docker/docker-compose.yml logs -f        # xem log
#    docker compose -f docker/docker-compose.yml down           # tắt
# ══════════════════════════════════════════════════════════════════

x-common: &common
  build:
    context: ..
    dockerfile: docker/Dockerfile
  restart: unless-stopped
  env_file: ../.env
  volumes:
    - ../data:/app/data
    - ../ml/artifacts:/app/ml/artifacts

services:

  # ── Layer 1: Data Collector ───────────────────────────────────
  collector:
    <<: *common
    container_name: btc_collector
    command: python collector/main.py

  # ── Layer 2+3: Feature Engine ─────────────────────────────────
  feature_engine:
    <<: *common
    container_name: btc_feature
    command: python feature_engine/run.py
    depends_on: [collector]

  # ── Layer 5: Signal Engine ────────────────────────────────────
  signal:
    <<: *common
    container_name: btc_signal
    command: python signal/run.py
    depends_on: [feature_engine]

  # ── Layer 4: Auto Train (retrain mỗi 1h) ─────────────────────
  auto_train:
    <<: *common
    container_name: btc_autotrain
    command: python ml/auto_train.py
    depends_on: [feature_engine]

  # ── Layer 6: Dashboard ────────────────────────────────────────
  dashboard:
    <<: *common
    container_name: btc_dashboard
    working_dir: /app/server
    command: daphne -b 0.0.0.0 -p 8000 btc_dashboard.asgi:application
    ports:
      - "8000:8000"
    depends_on: [collector]
