version: "3.9"

# ══════════════════════════════════════════════════════════════════
#  BTC Liquidation Predictor — Docker Compose
#  Usage:
#    docker compose up -d               # start all
#    docker compose up dashboard        # chỉ dashboard
#    docker compose logs -f collector   # xem log
# ══════════════════════════════════════════════════════════════════

x-common: &common
  restart: unless-stopped
  env_file: ../.env
  volumes:
    - ../data:/app/data            # shared data volume
    - ../ml/artifacts:/app/ml/artifacts

services:

  # ── Layer 1: Data Collector ───────────────────────────────────
  collector:
    <<: *common
    build:
      context: ..
      dockerfile: docker/Dockerfile.collector
    container_name: btc_collector
    volumes:
      - ../data/raw:/app/data/raw

  # ── Layer 2+3: Feature Engine ────────────────────────────────
  feature_engine:
    <<: *common
    build:
      context: ..
      dockerfile: docker/Dockerfile.feature
    container_name: btc_feature
    depends_on: [collector]
    volumes:
      - ../data:/app/data

  # ── Layer 5: Signal Engine ────────────────────────────────────
  signal:
    <<: *common
    build:
      context: ..
      dockerfile: docker/Dockerfile.signal
    container_name: btc_signal
    depends_on: [feature_engine]
    volumes:
      - ../data:/app/data
      - ../ml/artifacts:/app/ml/artifacts

  # ── Layer 6: Dashboard ────────────────────────────────────────
  dashboard:
    <<: *common
    build:
      context: ..
      dockerfile: docker/Dockerfile.dashboard
    container_name: btc_dashboard
    ports:
      - "8000:8000"
    depends_on: [collector]
    volumes:
      - ../data:/app/data
      - ../ml/artifacts:/app/ml/artifacts
